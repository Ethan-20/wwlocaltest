<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>轮播图调试页面</title>
  <!-- Vant 2 CSS -->
  <link rel="stylesheet" href="https://unpkg.com/vant@2/lib/index.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; }

    /* ===== 调试面板 ===== */
    #debug-panel {
      background: #333;
      color: #0f0;
      font-size: 12px;
      padding: 8px 12px;
      line-height: 1.8;
      word-break: break-all;
    }

    /* ===== 完全对应 index.vue 的 SCSS ===== */
    .lunbo {
      flex: 1;
      overflow: hidden;
      height: 170px;
      width: 100%;
      background-color: #E9E9E9;
    }

    /* 对应 .my-swipe */
    .my-swipe {
      height: 100%;
      overflow-y: hidden;
    }

    /* 对应 .my-swipe-isWechatwoerk */
    .my-swipe-isWechatwoerk {
      height: 170px;
      overflow-y: hidden;
    }

    /* 对应 .imgWord */
    .imgWord {
      position: absolute;
      left: 20px;
      width: 80%;
      height: 14px;
      line-height: 20px;
      display: flex;
      justify-content: left;
    }

    /* 修复：<a> 需要 position:relative，imgWord 的 absolute 才能相对它定位 */
    .van-swipe-item a {
      display: block;
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* 对应 .imgWordWidth */
    .imgWordWidth {
      position: absolute;
      font-size: 16px;
      display: block;
      padding-left: 10px;
      width: 80%;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      z-index: 100;
      color: #fff;
    }

    /* 对应 .ios-imgPattern */
    .ios-imgPattern {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      z-index: 99;
      padding: 0px;
      object-position: center center;
    }

    /* 对应 .android-imgPattern */
    .android-imgPattern {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      z-index: 99;
      padding: 0px;
    }

    /* 对应 .imgPattern */
    .imgPattern {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      z-index: 99;
      padding: 0px;
    }

    /* 对应 /deep/ .van-swipe__indicators */
    .van-swipe__indicators {
      left: 90%;
    }

    /* 对应 /deep/ .van-swipe */
    .van-swipe {
      width: 100%;
    }

    /* 对应 /deep/ .van-swipe-item */
    .van-swipe-item {
      width: 100%;
      padding: 0px;
    }

    /* 对应 /deep/ .van-swipe__indicator--active */
    .van-swipe__indicator--active {
      background-color: #ffffff;
    }
  </style>
</head>
<body>

<!-- 完全对应 index.vue 的模板结构 -->
<div id="app">
  <div class="lunbo">
    <!-- isWechatwoerk 为 true 时使用 my-swipe-isWechatwoerk -->
    <van-swipe class="my-swipe-isWechatwoerk" :autoplay="3000" v-if="isWechatwoerk">
      <van-swipe-item v-for="(item, index) in imageList" :key="index">
        <a>
          <img v-if="item.pcpic.indexOf('.thumb.jpg') != -1"
               :class="isAndroid ? 'android-imgPattern' : 'ios-imgPattern'"
               :src="item.pcpic.split('.thumb.jpg')[0]"
               alt="" />
          <img v-else
               :class="isAndroid ? 'android-imgPattern' : 'ios-imgPattern'"
               :src="item.pcpic"
               alt="" />
          <span class="imgWord" :style="{'top': u.indexOf('wxworklocal') != -1 ? '140px' : '140px'}">
            <span class="imgWordWidth">{{ item.title }}</span>
          </span>
        </a>
      </van-swipe-item>
    </van-swipe>

    <!-- isWechatwoerk 为 false 时使用 my-swipe -->
    <van-swipe class="my-swipe" :autoplay="3000" v-else>
      <van-swipe-item v-for="(item, index) in imageList" :key="index">
        <a>
          <img v-if="item.pcpic.indexOf('.thumb.jpg') != -1"
               class="imgPattern"
               :src="item.pcpic.split('.thumb.jpg')[0]"
               alt="" />
          <img v-else
               class="imgPattern"
               :src="item.pcpic"
               alt="" />
          <span class="imgWord" :style="{'top': u.indexOf('wxworklocal') != -1 ? '140px' : '140px'}">
            <span class="imgWordWidth">{{ item.title }}</span>
          </span>
        </a>
      </van-swipe-item>
    </van-swipe>
  </div>
</div>

<!-- Vue 2 -->
<script src="https://unpkg.com/vue@2/dist/vue.js"></script>
<!-- Vant 2 JS -->
<script src="https://unpkg.com/vant@2/lib/vant.min.js"></script>

<script>
  // 注册 Vant 组件
  Vue.use(vant);

  new Vue({
    el: '#app',
    data: function() {
      return {
        // ===== 对应 index.vue 的 data =====
        // 后端数据替换为本地 hardcode
        imageList: [
          { pcpic: 'thumb.png', title: '测试测试测试测试', wechaturl: '' },
          { pcpic: 'thumb.png', title: '测试测试测试测试', wechaturl: '' },
          { pcpic: 'thumb.png', title: '测试测试测试测试', wechaturl: '' }
        ],
        u: navigator.userAgent,
        isAndroid: /Android/i.test(navigator.userAgent),
        isWechatwoerk: /wxworklocal/i.test(navigator.userAgent)
      };
    },
    created: function() {
      // 更新调试面板（因为调试面板在 #app 外，手动更新）
      var ua = this.u;
      document.getElementById('debug-panel').innerHTML =
        '<div>📱 UserAgent: ' + ua + '</div>' +
        '<div>🤖 isAndroid: <b>' + this.isAndroid + '</b> &nbsp;|&nbsp; 🏢 isWechatWork: <b>' + this.isWechatwoerk + '</b></div>' +
        '<div>🖼️ imageList 条数: <b>' + this.imageList.length + '</b></div>';
    }
  });
</script>

</body>
</html>
